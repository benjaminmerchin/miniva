<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hermes Agents Harness</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #17202a;
        --muted: #687385;
        --line: #d9dee7;
        --primary: #0f766e;
        --primary-strong: #115e59;
        --danger: #b42318;
        --focus: #2563eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        font-size: 15px;
        line-height: 1.4;
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        margin: 28px auto;
      }

      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      h1,
      h2 {
        margin: 0;
        letter-spacing: 0;
      }

      h1 {
        font-size: clamp(26px, 4vw, 42px);
        font-weight: 760;
      }

      h2 {
        font-size: 18px;
        font-weight: 720;
      }

      .status {
        min-height: 22px;
        color: var(--primary);
        text-align: right;
      }
      .status a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
      }
      .status a:hover {
        text-decoration: underline;
      }

      .grid {
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 16px;
        align-items: start;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 640;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 7px;
        color: var(--text);
        background: #fff;
        font: inherit;
        padding: 10px 11px;
      }

      input:focus,
      select:focus,
      textarea:focus,
      button:focus-visible {
        outline: 2px solid var(--focus);
        outline-offset: 2px;
      }

      button {
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #fff;
        color: var(--text);
        font: inherit;
        font-weight: 680;
        padding: 9px 12px;
        cursor: pointer;
      }

      button.primary {
        background: var(--primary);
        border-color: var(--primary);
        color: white;
      }

      button.primary:hover {
        background: var(--primary-strong);
      }

      button.danger {
        color: white;
        background: var(--danger);
        border-color: var(--danger);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .muted {
        color: var(--muted);
      }

      .list {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .item {
        display: grid;
        gap: 2px;
        border: 1px solid var(--line);
        border-radius: 7px;
        padding: 10px 11px;
        background: #fbfcfd;
        transition: all 0.2s ease;
      }

      .item strong {
        font-size: 14px;
      }

      @media (max-width: 840px) {
        main {
          width: min(100vw - 20px, 680px);
          margin: 16px auto;
        }

        header {
          align-items: flex-start;
          flex-direction: column;
        }

        .status {
          text-align: left;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Agents Harness</h1>
          <div class="muted">Test existing agents directly</div>
        </div>
        <div class="status">
          <a href="/panel/index.html">← Back to Voice Panel</a>
          <a href="/panel/observability.html" style="margin-left: 12px;">Observability</a>
        </div>
      </header>

      <div class="grid">
        <section class="panel stack">
          <h2>Select Agent</h2>
          <div class="list" id="agentList">
             <!-- Javascript will populate these as clickable items -->
          </div>
        </section>

        <section class="panel stack">
          <h2 id="currentAgentTitle">Chat with Agent</h2>
          <div id="chatHistory" style="min-height: 300px; max-height: 500px; overflow-y: auto; border: 1px solid var(--line); border-radius: 7px; padding: 12px; background: #fbfcfd; display: flex; flex-direction: column; gap: 12px;">
            <div class="muted" style="text-align: center; margin-top: auto; margin-bottom: auto;">Select an agent to start a session.</div>
          </div>
          <div class="row" style="flex-wrap: nowrap; margin-top: auto;">
            <input type="text" id="chatInput" placeholder="Type a message..." disabled style="flex: 1;" />
            <button class="primary" id="sendBtn" disabled>Send</button>
          </div>
        </section>
      </div>
    </main>

    <script>
      const agents = ["Tripo", "Trippy", "Grogro", "General", "Voice"];
      const state = {
        agent: null,
        token: localStorage.getItem("hermes_voice_token") || "",
      };

      const $ = (id) => document.getElementById(id);

      function renderAgents() {
        const list = $("agentList");
        list.innerHTML = "";
        for (const name of agents) {
          const item = document.createElement("div");
          item.className = "item";
          item.style.cursor = "pointer";
          item.innerHTML = `<strong>${name}</strong>`;
          item.onclick = () => selectAgent(name, item);
          list.appendChild(item);
        }
      }

      function selectAgent(name, element) {
        state.agent = name;
        $("currentAgentTitle").textContent = `Chat with ${name}`;
        
        // Update selection styling
        document.querySelectorAll("#agentList .item").forEach(el => {
            el.style.borderColor = "var(--line)";
            el.style.background = "#fbfcfd";
        });
        element.style.borderColor = "var(--primary)";
        element.style.background = "rgba(15, 118, 110, 0.08)";
        
        $("chatInput").disabled = false;
        $("sendBtn").disabled = false;
        $("chatHistory").innerHTML = `<div class="muted" style="text-align: center;">Started session with ${name}...</div>`;
        $("chatInput").focus();
      }

      function appendMessage(sender, text, isError = false) {
        const div = document.createElement("div");
        div.style.padding = "10px 14px";
        div.style.borderRadius = "12px";
        div.style.maxWidth = "85%";
        div.style.wordBreak = "break-word";
        div.style.whiteSpace = "pre-wrap";
        div.style.lineHeight = "1.5";
        
        if (sender === "You") {
            div.style.alignSelf = "flex-end";
            div.style.background = "var(--primary)";
            div.style.color = "white";
            div.style.borderBottomRightRadius = "4px";
        } else {
            div.style.alignSelf = "flex-start";
            div.style.background = isError ? "rgba(180, 35, 24, 0.1)" : "white";
            div.style.border = isError ? "1px solid var(--danger)" : "1px solid var(--line)";
            div.style.color = isError ? "var(--danger)" : "var(--text)";
            div.style.borderBottomLeftRadius = "4px";
            div.style.boxShadow = "0 1px 2px rgba(0,0,0,0.05)";
        }
        
        const b = document.createElement("strong");
        b.textContent = sender;
        b.style.display = "block";
        b.style.marginBottom = "4px";
        b.style.fontSize = "13px";
        b.style.opacity = sender === "You" ? "0.9" : "0.7";
        
        const content = document.createElement("span");
        content.textContent = text;
        
        div.appendChild(b);
        div.appendChild(content);
        $("chatHistory").appendChild(div);
        $("chatHistory").scrollTop = $("chatHistory").scrollHeight;
      }

      async function sendMessage() {
        if (!state.agent) return;
        const text = $("chatInput").value.trim();
        if (!text) return;

        $("chatInput").value = "";
        appendMessage("You", text);

        const headers = {
            "Content-Type": "application/json"
        };
        if (state.token) {
            headers["Authorization"] = `Bearer ${state.token}`;
        }

        try {
            $("sendBtn").disabled = true;
            $("sendBtn").textContent = "...";
            const response = await fetch("/agents/turn", {
                method: "POST",
                headers: headers,
                body: JSON.stringify({
                    transcript: text,
                    agent: state.agent,
                    user_id: "panel_user"
                })
            });
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.detail || response.statusText);
            }
            appendMessage(state.agent, data.reply);
        } catch (error) {
            appendMessage("System", error.message, true);
        } finally {
            $("sendBtn").disabled = false;
            $("sendBtn").textContent = "Send";
            $("chatInput").focus();
        }
      }

      $("sendBtn").onclick = sendMessage;
      $("chatInput").onkeypress = (e) => {
          if (e.key === "Enter") sendMessage();
      };

      renderAgents();
    </script>
  </body>
</html>
