<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hermes Observability</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #17202a;
        --muted: #687385;
        --line: #d9dee7;
        --primary: #0f766e;
        --primary-strong: #115e59;
        --danger: #b42318;
        --focus: #2563eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        font-size: 15px;
        line-height: 1.4;
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        margin: 28px auto;
      }

      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      h1,
      h2 {
        margin: 0;
        letter-spacing: 0;
      }

      h1 {
        font-size: clamp(26px, 4vw, 42px);
        font-weight: 760;
      }

      h2 {
        font-size: 18px;
        font-weight: 720;
      }

      .status {
        min-height: 22px;
        color: var(--primary);
        text-align: right;
      }
      .status a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
        margin-left: 12px;
      }
      .status a:hover {
        text-decoration: underline;
      }

      .grid {
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 16px;
        align-items: start;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      
      .space-between {
          justify-content: space-between;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 640;
      }

      .muted {
        color: var(--muted);
      }

      .list {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .item {
        display: grid;
        gap: 4px;
        border: 1px solid var(--line);
        border-radius: 7px;
        padding: 10px 11px;
        background: #fbfcfd;
      }

      .item strong {
        font-size: 14px;
      }
      
      .stat-value {
        font-size: 24px;
        font-weight: 700;
        color: var(--primary);
      }
      
      .stat-label {
        font-size: 12px;
        text-transform: uppercase;
        color: var(--muted);
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      .live-indicator {
        display: inline-block;
        width: 8px;
        height: 8px;
        background-color: #10b981;
        border-radius: 50%;
        margin-right: 6px;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
        70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
        100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
      }

      @media (max-width: 840px) {
        main {
          width: min(100vw - 20px, 680px);
          margin: 16px auto;
        }

        header {
          align-items: flex-start;
          flex-direction: column;
        }

        .status {
          text-align: left;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Observability</h1>
          <div class="muted"><span class="live-indicator"></span> Live Hermes Agent Reporting</div>
        </div>
        <div class="status">
          <a href="/panel/index.html">Voice Panel</a>
          <a href="/panel/agents.html">Agents</a>
        </div>
      </header>

      <div class="grid">
        <section class="panel stack">
          <h2>Agent Status</h2>
          
          <div class="item">
            <div class="stat-label">Current Job</div>
            <strong style="font-size: 16px; margin-top: 4px;" id="currentJob">Loading...</strong>
          </div>
          
          <div class="row" style="margin-top: 8px;">
              <div class="item" style="flex: 1;">
                <div class="stat-label">Status</div>
                <div class="stat-value" id="agentStatus" style="font-size: 18px;">-</div>
              </div>
              <div class="item" style="flex: 1;">
                <div class="stat-label">Uptime</div>
                <div class="stat-value" id="agentUptime" style="font-size: 18px;">-</div>
              </div>
          </div>
        </section>

        <section class="panel stack">
          <h2>Cost Per Task</h2>
          <div class="list" id="taskList">
             <div class="muted" style="text-align: center; padding: 20px;">Fetching live data...</div>
          </div>
          
          <div class="row space-between" style="margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--line);">
              <span class="stat-label" style="font-size: 14px;">Total Accumulated Cost</span>
              <span class="stat-value" id="totalCost">$0.0000</span>
          </div>
        </section>
      </div>
    </main>

    <script>
      const state = {
        token: localStorage.getItem("hermes_voice_token") || "",
      };

      const $ = (id) => document.getElementById(id);

      async function fetchStats() {
        const headers = {};
        if (state.token) {
            headers["Authorization"] = `Bearer ${state.token}`;
        }
        try {
            const response = await fetch("/observability/stats", { headers });
            if (!response.ok) throw new Error("Failed to fetch");
            const data = await response.json();
            
            $("currentJob").textContent = data.current_job;
            $("agentStatus").textContent = data.status;
            $("agentUptime").textContent = data.uptime_minutes + "m";
            
            const list = $("taskList");
            list.innerHTML = "";
            let total = 0;
            
            if (data.tasks && data.tasks.length > 0) {
                for (const task of data.tasks) {
                    total += task.cost;
                    const item = document.createElement("div");
                    item.className = "item row space-between";
                    item.innerHTML = `
                        <div style="display: flex; flex-direction: column; gap: 2px;">
                            <strong>${task.name}</strong>
                            <span class="muted" style="font-size: 12px; font-family: monospace;">ID: ${task.id}</span>
                        </div>
                        <strong style="color: var(--danger);">$${task.cost.toFixed(4)}</strong>
                    `;
                    list.appendChild(item);
                }
            } else {
                list.innerHTML = `<div class="muted" style="text-align: center; padding: 20px;">No active tasks.</div>`;
            }
            
            $("totalCost").textContent = "$" + total.toFixed(4);
            
        } catch (error) {
            console.error("Observability fetch error:", error);
            if ($("taskList").innerHTML.includes("Fetching")) {
                 $("taskList").innerHTML = `<div style="color: var(--danger); text-align: center; padding: 20px;">Failed to load data. Is backend running?</div>`;
            }
        }
      }

      // Fetch immediately and then poll every 3 seconds
      fetchStats();
      setInterval(fetchStats, 3000);
    </script>
  </body>
</html>
